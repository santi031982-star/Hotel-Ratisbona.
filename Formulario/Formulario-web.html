<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="CSS/Estilo-Formulario.css">
</head>
<body>
    <div class="container">
        <form action="https://api.web3forms.com/submit" method="POST">

 <input type="hidden" name="access_key" value="cd53c601-377b-4520-b669-51ff1e293b2d">
            <h2><i class="fa-solid fa-envelope"></i>Contacto</h2>
            <p class="subtitle">Ingresa tus datos correctamente y pronto te responderemos a tu correo.</p>

            <div class="input-group">
                <label for="name"><i class="fa-solid fa-user"></i>Nombre</label>
                <input type="text" name="name" id="name"
                 placeholder="Ingresa tus nombres" required>

                 <label for="phone"><i class="fa-solid fa-phone"></i>Telefono</label>
                <input type="tel" name="name" id="phone"
                 placeholder="Ingresa tu Telefono" required>

                 <label for="Email"><i class="fa-solid fa-at"></i>Email</label>
                <input type="text" name="name" id="email"
                 placeholder="Ingrese su Email" required>

                 <label for="message"><i class="fa-solid fa-comment-dots"></i>Mensaje</label>
                <textarea name="message" id="message" rows="4" placeholder="¿En que los podemos ayudar?"></textarea>

                <div class="form-links">
                    <a href="#">politica de Privacidad</a>
                    <a href="#">Terminos y condiciones</a>
                </div>
                
                <button type="submit" class="btn">
                    <span>Enviar Mensaje</span>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>

        </form>
</body>
</html>
